name: CI and Vercel Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Install, lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker:
    name: Build and push backend images
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build API Gateway image
        run: |
          docker build -f api-gateway/Dockerfile -t ${{ secrets.DOCKER_REGISTRY }}/archive-api-gateway:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_REGISTRY }}/archive-api-gateway:${{ github.sha }}

      - name: Build Auth Service image
        run: |
          docker build -f services/auth-service/Dockerfile -t ${{ secrets.DOCKER_REGISTRY }}/archive-auth-service:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_REGISTRY }}/archive-auth-service:${{ github.sha }}

      - name: Build User Service image
        run: |
          docker build -f services/user-service/Dockerfile -t ${{ secrets.DOCKER_REGISTRY }}/archive-user-service:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_REGISTRY }}/archive-user-service:${{ github.sha }}

      - name: Build Admin Service image
        run: |
          docker build -f services/admin-service/Dockerfile -t ${{ secrets.DOCKER_REGISTRY }}/archive-admin-service:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_REGISTRY }}/archive-admin-service:${{ github.sha }}

  deploy-vercel:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Vercel artifact
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Vercel artifact
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
